services:
  # Amadeus multi-user deployment (single URL on :3001):
  #   gateway (nginx)  — routes by identity; unauthenticated -> login page
  #   auth-gateway     — a CloudCLI instance in auth mode: serves the login UI,
  #                      owns the shared user database, issues the auth cookie,
  #                      and answers nginx's auth_request verify.
  #   amadeus-<user>   — per-user backend containers (see docker-compose.multi.yml,
  #                      generated by scripts/user.sh); platform mode, isolated.
  #
  #   ./scripts/user.sh add <username>
  #   docker compose -f docker-compose.yml -f docker-compose.multi.yml up -d
  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-gateway

  # Auth entrypoint: standard CloudCLI image, but only its auth surface is used.
  # AMADEUS_MULTI_USER lets it register more than one account; the shared
  # JWT_SECRET means the cookie it issues is verifiable everywhere.
  auth-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SKIP_AUTH: "false"
    restart: unless-stopped
    # Thin auth entrypoint — reuses CloudCLI's auth code but loads none of the
    # app runtime (no pty/git/chat/watchers). Bypasses entrypoint.sh.
    entrypoint: ["node", "dist-server/server/auth-server.js"]
    working_dir: /opt/cloudcli
    environment:
      - AMADEUS_MULTI_USER=true
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env}
      # Persist the user DB in the volume; the thin entrypoint bypasses the
      # env loader that would otherwise default this, so set it explicitly.
      # Without it the DB falls back to a path inside the image (lost on rebuild).
      - DATABASE_PATH=/home/agent/.amadeus/auth.db
      - NODE_ENV=production
      # Registration is admin-only; scripts/user.sh presents this token.
      - AMADEUS_ADMIN_TOKEN=${AMADEUS_ADMIN_TOKEN:?set AMADEUS_ADMIN_TOKEN in .env}
    volumes:
      - auth-users:/home/agent
    expose:
      - "3001"

volumes:
  auth-users:
