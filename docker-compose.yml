services:
  # === Multi-user: nginx gateway + per-user containers ===
  # Managed by scripts/add-user.sh
  # Start: docker compose --profile multi up -d
  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gateway/htpasswd:/etc/nginx/htpasswd:ro
      - ./gateway/user-routes.conf:/etc/nginx/user-routes.conf:ro
    profiles: ["multi"]

  # === Single-user mode: no login, direct access ===
  # Start: docker compose up -d
  amadeus:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SKIP_AUTH: "true"
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - user-data:/home/agent
    environment:
      - VITE_IS_PLATFORM=true
      - DISABLE_AUTOUPDATER=1
      - LIGHTRAG_URL=http://lightrag:9621
      - WORKSPACES_ROOT=/home/agent/workspace
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      lightrag:
        condition: service_healthy

  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9621:9621"
    volumes:
      - lightrag-data:/app/data
    environment:
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - LLM_MODEL=${LLM_MODEL:-claude-sonnet-4-20250514}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9621/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  user-data:
  lightrag-data:
