services:
  # Amadeus is a multi-user deployment: an nginx gateway on 3001 does basic-auth
  # login, then routes each user to their own container. Add users with
  # scripts/add-user.sh (writes per-user services to docker-compose.multi.yml).
  #
  #   ./scripts/add-user.sh <username>
  #   docker compose -f docker-compose.yml -f docker-compose.multi.yml up -d
  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gateway/htpasswd:/etc/nginx/htpasswd:ro
      - ./gateway/user-routes.conf:/etc/nginx/user-routes.conf:ro

  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9621:9621"
    volumes:
      - lightrag-data:/app/data
    environment:
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - LLM_MODEL=${LLM_MODEL:-claude-sonnet-4-20250514}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9621/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  lightrag-data:
