# Amadeus gateway — single URL, cookie-based auth, per-user routing.
#
#   - Unauthenticated requests are proxied to the auth entrypoint (a CloudCLI
#     instance in auth mode) which serves the login/register UI.
#   - On login the entrypoint sets an HttpOnly `amadeus_token` cookie.
#   - Every request is checked via auth_request against the entrypoint's
#     /api/auth/gateway-verify, which validates the cookie and returns the
#     username in X-Auth-User.
#   - Authenticated requests are routed to that user's backend container
#     (amadeus-<username>), which runs in platform mode (no login of its own).

server {
    listen 3001;

    # Emit relative Location headers (e.g. `/login`) instead of letting nginx
    # rebuild an absolute URL from its listen port — otherwise redirects leak the
    # internal `:3001` and the scheme, so a public request to https://host/ would
    # bounce to http://host:3001/login (wrong port, wrong scheme, breaks behind
    # the Cloudflare Tunnel). The browser resolves the relative path against the
    # real origin.
    absolute_redirect off;

    # proxy_pass to a variable requires an explicit resolver; 127.0.0.11 is
    # Docker's embedded DNS (resolves compose service names).
    resolver 127.0.0.11 valid=10s;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # Auth UI + endpoints live on the entrypoint. Served without auth_request so
    # the login page and the login/register POSTs are always reachable.
    #
    # These proxy to a VARIABLE ($auth_upstream) rather than a literal
    # `auth-gateway`. nginx resolves a literal upstream once at startup and
    # caches the IP forever — so rebuilding the auth-gateway container (new IP)
    # silently 401s every request until nginx is manually restarted. A variable
    # forces per-request re-resolution via the Docker DNS resolver above.
    # (The `location /` block below already does this for the per-user backends.)
    set $auth_upstream auth-gateway;

    location /login {
        proxy_pass http://$auth_upstream:3001$request_uri;
    }
    location /api/auth/ {
        proxy_pass http://$auth_upstream:3001$request_uri;
    }

    # Internal verify subrequest: validates the cookie, yields X-Auth-User.
    location = /_gateway_verify {
        internal;
        proxy_pass http://$auth_upstream:3001/api/auth/gateway-verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    location / {
        auth_request /_gateway_verify;
        auth_request_set $auth_user $upstream_http_x_auth_user;

        # Not logged in -> send the browser to the login page.
        error_page 401 403 = @login_redirect;

        # Route to the authenticated user's backend container.
        proxy_pass http://amadeus-$auth_user:3001;
    }

    location @login_redirect {
        return 302 /login;
    }
}
