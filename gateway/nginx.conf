# Amadeus gateway — auth-based routing to per-user containers.
# Single port (3001), nginx basic auth determines username,
# then proxies to the matching user container.

map $remote_user $target_backend {
    default        "";
    # ponytail: managed by scripts/add-user.sh — one line per user
    include /etc/nginx/user-routes.conf;
}

server {
    listen 3001;

    auth_basic "Amadeus";
    auth_basic_user_file /etc/nginx/htpasswd;

    # Reject unknown users (no matching container)
    if ($target_backend = "") {
        return 403;
    }

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-User $remote_user;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    location / {
        proxy_pass http://$target_backend;
    }
}
